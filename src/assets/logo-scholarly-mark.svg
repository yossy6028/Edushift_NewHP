<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Origami back wing (Navy) - folded plane silhouette -->
  <path d="M 40 178
           L 180 60
           L 220 70
           L 130 170
           L 128 200
           Z"
        fill="#0b1b3a" />
  <!-- Origami front wing (Gold) - overlapping, offset right -->
  <path d="M 80 210
           L 228 84
           L 246 100
           L 170 200
           L 172 230
           Z"
        fill="#b08a3e" />
  <!-- Crease line on navy -->
  <line x1="120" y1="130" x2="195" y2="78" stroke="#f7f2e8" stroke-width="1.2" stroke-opacity="0.6"/>
</svg>
